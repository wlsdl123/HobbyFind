<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이상형 월드컵</title>
  <link rel="stylesheet" href="ideal-worldcup.css">
</head>
<body>
  <div class="worldcup">
    <header>
      <h1>이상형 월드컵</h1>
      <p>두 후보 중 하나를 선택하면 다음 라운드로 이동합니다.</p>
    </header>

    <section class="status-bar">
      <div>
        <div class="round-info">현재 단계 <span id="round-number">1강</span></div>
        <div class="match-info" id="match-info">매치 1 / 4</div>
      </div>
      <button id="restart">다시 시작</button>
    </section>

    <section class="matchup" id="matchup">
      <button class="candidate" id="choiceA" aria-label="선택 A"></button>
      <span class="vs">VS</span>
      <button class="candidate" id="choiceB" aria-label="선택 B"></button>
    </section>

    <section class="result" id="result" hidden>
      <h2>최종 우승!</h2>
      <div class="winner" id="winner"></div>
      <button id="play-again">다시 플레이</button>
    </section>
  </div>

  <script src="ideal-worldcup.js"></script>
</body>
</html>
